<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff7fb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="L&amp;LT Manager" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Luxe & Little Treasures</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 10% 0%, rgba(255, 47, 152, 0.42), transparent 34%),
          radial-gradient(circle at 88% 4%, rgba(216, 251, 49, 0.58), transparent 30%),
          radial-gradient(circle at 82% 100%, rgba(145, 54, 221, 0.48), transparent 36%),
          linear-gradient(145deg, #fff8fd 0%, #fffef2 48%, #f7efff 100%);
      }

      .boot-shell {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        color: #231227;
      }

      .boot-card {
        width: min(78vw, 300px);
        min-height: 260px;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 18px;
        padding: 28px;
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.82);
        box-shadow:
          0 26px 58px rgba(89, 44, 98, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.95),
          inset 0 -18px 38px rgba(145, 54, 221, 0.055);
        text-align: center;
      }

      .boot-card img {
        width: 92px;
        height: 92px;
        border-radius: 24px;
        box-shadow: 0 18px 36px rgba(87, 45, 94, 0.18);
        animation: bootFloat 1.15s ease-in-out infinite alternate;
      }

      .boot-card strong {
        color: #ff2f98;
        font-size: 20px;
      }

      .boot-card span {
        color: #765f79;
        font-size: 13px;
        font-weight: 700;
      }

      @keyframes bootFloat {
        from { transform: translateY(0) scale(0.98); }
        to { transform: translateY(-5px) scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-shell">
        <section class="boot-card">
          <img src="/apple-touch-icon.png" alt="" />
          <strong>Luxe &amp; Little Treasures</strong>
          <span>Opening business manager...</span>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
